# ─────────────────────────────────────────────
# Mosquitto MQTT Broker — UR5 Control Station
# ─────────────────────────────────────────────

# ── MQTT Listener (for Python bridge) ──
listener 1883
protocol mqtt

# ── WebSocket Listener (for React frontend) ──
listener 9001
protocol websockets

# ── Security ──
# For local development: allow anonymous
# For production: set to false and configure password_file
allow_anonymous true
# password_file /etc/mosquitto/passwd

# ── Logging ──
log_type all
log_dest stdout

# ── Performance ──
max_queued_messages 1000
message_size_limit 65535

# ── Persistence ──
persistence false
